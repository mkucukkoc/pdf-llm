version: "3.9"

services:
  api:
    build: ./backend
    container_name: pdfllm_api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - pdfdata:/data
    depends_on:
      - qdrant
      - redis
    command: bash -lc "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    container_name: pdfllm_worker
    env_file: .env
    volumes:
      - ./backend:/app
      - pdfdata:/data
    depends_on:
      - redis
    command: bash -lc "celery -A worker.celery_app.app worker --loglevel=INFO"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: pdfllm_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: pdfllm_redis
    ports:
      - "6379:6379"

volumes:
  qdrant_storage: {}
  pdfdata: {}
